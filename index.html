<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Achadinhos</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #e91e63; text-align: center; margin-top: 0; }
        label { font-weight: bold; display: block; margin-top: 15px; font-size: 14px; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #e91e63; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 16px; }
        button:active { background: #ad1457; }
        #resultado { display: none; margin-top: 20px; padding: 15px; background: #fff0f5; border: 2px dashed #e91e63; border-radius: 10px; }
        .legenda { white-space: pre-wrap; background: white; padding: 10px; border-radius: 5px; border: 1px solid #eee; font-size: 14px; margin-bottom: 10px; }
        #preview-img, #preview-vid { width: 100%; border-radius: 10px; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🛍️ Gerador de Vendas</h2>
    
    <label>1. Escolha a Foto ou Vídeo:</label>
    <input type="file" id="arquivo" accept="image/,video/" onchange="mostrarPreview()">

    <label>2. Seu Link de Afiliado:</label>
    <input type="text" id="link-venda" placeholder="Cole o link da Shopee ou ML">

    <label>3. Qual o nicho?</label>
    <select id="nicho">
        <option value="moda">👗 Moda</option>
        <option value="cozinha">🍳 Cozinha</option>
        <option value="casa">🏠 Casa</option>
    </select>

    <button onclick="gerarPost()">🚀 GERAR E COPIAR LEGENDA</button>

    <div id="resultado">
        <strong>✅ Legenda Copiada!</strong>
        <div class="legenda" id="texto-final"></div>
        <img id="preview-img">
        <video id="preview-vid" controls></video>
    </div>
</div>

<script>
    const frases = {
        moda: "OLHA ESSE LOOK! ✨\n\nQualidade incrível e veste super bem. Perfeito para o seu dia!\n\n🛍️ COMPRE AQUI: ",
        cozinha: "Sua cozinha precisa disso! 🍳\n\nPraticidade nota 10 no dia a dia. Facilita muito!\n\n🛍️ COMPRE AQUI: ",
        casa: "O achadinho perfeito para o seu lar! 🏠\n\nLindo, prático e muito barato.\n\n🛍️ COMPRE AQUI: "
    };

    function mostrarPreview() {
        const file = document.getElementById('arquivo').files[0];
        const img = document.getElementById('preview-img');
        const vid = document.getElementById('preview-vid');
        
        img.style.display = 'none';
        vid.style.display = 'none';

        if (file) {
            const url = URL.createObjectURL(file);
            if (file.type.startsWith('image/')) {
                img.src = url; img.style.display = 'block';
            } else {
                vid.src = url; vid.style.display = 'block';
            }
        }
    }

    function gerarPost() {
        const link = document.getElementById('link-venda').value || "LINK NA BIO";
        const nicho = document.getElementById('nicho').value;
        const textoBase = frases[nicho];
        
        const legendaCompleta = textoBase + link + "\n\n#achadinhos #shopee #vendas #promo";
        
        document.getElementById('texto-final').innerText = legendaCompleta;
        document.getElementById('resultado').style.display = 'block';
        
        // Copia automático
        const tempInput = document.createElement("textarea");
        tempInput.value = legendaCompleta;
        document.body.appendChild(tempInput);
        tempInput.select();
        document.execCommand("copy");
        document.body.removeChild(tempInput);
        
        alert("✨ Sucesso! Legenda copiada.\nAgora é só postar!");
    }
</script>

</body>
</html>
