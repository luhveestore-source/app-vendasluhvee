<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Achadinhos V3</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #e91e63; text-align: center; margin: 0 0 20px 0; }
        label { font-weight: bold; display: block; margin-top: 15px; font-size: 13px; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #e91e63; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 16px; }
        #resultado { display: none; margin-top: 20px; border: 2px dashed #e91e63; border-radius: 10px; padding: 10px; text-align: center; }
        #canvas-preview { width: 100%; border-radius: 10px; margin-top: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .legenda { white-space: pre-wrap; background: #fff0f5; padding: 10px; border-radius: 5px; font-size: 14px; text-align: left; margin-bottom: 10px; border: 1px solid #ffc1d6; }
        .download-btn { background: #333; margin-top: 10px; display: inline-block; text-decoration: none; color: white; padding: 10px; border-radius: 10px; width: 100%; }
    </style>
</head>
<body>

<div class="card">
    <h2>🛍️ Gerador de Achadinhos</h2>
    
    <label>1. Foto do Produto:</label>
    <input type="file" id="foto" accept="image/*">

    <label>2. Sua Logo (Marca d'água):</label>
    <input type="file" id="logo" accept="image/*">

    <label>3. Seu Link:</label>
    <input type="text" id="link" placeholder="Cole seu link aqui">

    <button onclick="processar()">🚀 RECORTAR E GERAR</button>

    <div id="resultado">
        <div class="legenda" id="texto-final"></div>
        <canvas id="canvas-preview"></canvas>
        <a id="download" class="download-btn">💾 BAIXAR IMAGEM PRONTA</a>
        <p style="font-size: 12px; color: #666;">(Legenda já copiada!)</p>
    </div>
</div>

<script>
    function processar() {
        const fotoFile = document.getElementById('foto').files[0];
        const logoFile = document.getElementById('logo').files[0];
        const link = document.getElementById('link').value || "LINK NA BIO";
        
        if (!fotoFile || !logoFile) {
            alert("⚠️ Por favor, selecione a foto e a logo!");
            return;
        }

        const canvas = document.getElementById('canvas-preview');
        const ctx = canvas.getContext('2d');
        const imgFoto = new Image();
        const imgLogo = new Image();

        imgFoto.onload = function() {
            // 1. Criar um quadrado de 1080x1080 (Padrão Instagram)
            canvas.width = 1080;
            canvas.height = 1080;

            // 2. Recortar a foto para preencher o quadrado
            let size = Math.min(imgFoto.width, imgFoto.height);
            let xOffset = (imgFoto.width - size) / 2;
            let yOffset = (imgFoto.height - size) / 2;
            ctx.drawImage(imgFoto, xOffset, yOffset, size, size, 0, 0, 1080, 1080);

            // 3. Carregar a Logo
            const readerLogo = new FileReader();
            readerLogo.onload = function(e) {
                imgLogo.onload = function() {
                    // Tamanho da logo (20% do total)
                    let logoW = 200;
                    let logoH = (imgLogo.height * logoW) / imgLogo.width;
                    
                    // Desenhar logo no canto inferior direito
                    ctx.drawImage(imgLogo, 1080 - logoW - 30, 1080 - logoH - 30, logoW, logoH);

                    // 4. Mostrar Resultado e Download
                    document.getElementById('resultado').style.display = 'block';
                    document.getElementById('download').href = canvas.toDataURL("image/jpeg", 0.9);
                    document.getElementById('download').download = "achadinho_pronto.jpg";

                    // 5. Legenda e Copiar
                    const legenda = "OLHA ESSE ACHADINHO! ✨\n\nQualidade incrível! Amei esse item. 😍\n\n🛍️ COMPRE AQUI: " + link + "\n\n#achadinhos #shopee #vendas";
                    document.getElementById('texto-final').innerText = legenda;
                    
                    const el = document.createElement('textarea');
                    el.value = legenda;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);

                    alert("✅ Legenda copiada e imagem pronta!");
                };
                imgLogo.src = e.target.result;
            };
            readerLogo.readAsDataURL(logoFile);
        };
        
        const readerFoto = new FileReader();
        readerFoto.onload = (e) => imgFoto.src = e.target.result;
        readerFoto.readAsDataURL(fotoFile);
    }
</script>

</body>
</html>
